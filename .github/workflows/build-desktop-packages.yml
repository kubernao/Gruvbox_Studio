# Builds Gruvbox Studio distributables on each supported GitHub-hosted runner
# (macOS arm64/x64, Linux x64/arm64, Windows x64/arm64). Electron Forge runs
# platform-appropriate makers per job; artifacts are uploaded per matrix cell
# and optionally bundled into one prerelease on pushes to master.

name: Build desktop packages

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-desktop:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-latest
            artifact_suffix: macos-arm64
          - name: macOS x64
            runner: macos-15-intel
            artifact_suffix: macos-x64
          - name: Linux x64
            runner: ubuntu-latest
            artifact_suffix: linux-x64
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: linux-arm64
          - name: Windows x64
            runner: windows-latest
            artifact_suffix: windows-x64
          - name: Windows arm64
            runner: windows-11-arm
            artifact_suffix: windows-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fakeroot dpkg-dev rpm

      - name: Install root dependencies
        run: npm ci

      - name: Install pi-mono dependencies
        run: npm --prefix "submodules/pi-mono" ci

      - name: Build distributable
        run: npm run make

      # Each matrix job produces `out/make/...` with similar inner paths; stage
      # under a unique top-level folder so merge-multiple downloads do not
      # overwrite each other on the release job.
      - name: Stage artifacts for upload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dest = Join-Path "dist-for-ci" "${{ matrix.artifact_suffix }}"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          if (-not (Test-Path "out/make")) {
            Write-Error "out/make missing after npm run make"
          }
          Copy-Item -Recurse -Force "out/make" $dest

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gruvbox-studio-${{ matrix.artifact_suffix }}
          path: dist-for-ci/${{ matrix.artifact_suffix }}
          if-no-files-found: error

  publish-desktop-release:
    name: Publish GitHub release
    needs: build-desktop
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gruvbox-studio-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release with all packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-build-${{ github.run_number }}
          name: Desktop build ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: true
          files: |
            release-assets/**/*
